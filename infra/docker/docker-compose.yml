services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: nexusdesk
      POSTGRES_PASSWORD: nexusdesk
      POSTGRES_DB: nexusdesk
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexusdesk"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  mailhog:
    image: mailhog/mailhog:v1.0.1
    ports:
      - "1025:1025"
      - "8025:8025"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  api:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.api
    env_file:
      - path: ../../.env
        required: false
    environment:
      DATABASE_URL: postgresql://nexusdesk:nexusdesk@postgres:5432/nexusdesk?schema=public
      REDIS_URL: redis://redis:6379
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  signaling:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.signaling
    environment:
      SIGNALING_HOST: 0.0.0.0
      SIGNALING_PORT: 4001
      JWT_ACCESS_SECRET: change-me-access-secret-min-32-chars-long!!
      JWT_ISSUER: nexusdesk
      JWT_AUDIENCE: nexusdesk-api
    ports:
      - "4001:4001"

  relay:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.relay
    environment:
      RELAY_HOST: 0.0.0.0
      RELAY_PORT: 4002
      TURN_SHARED_SECRET: change-me-turn-secret-min-32-chars-long!!
      TURN_REALM: nexusdesk.local
    ports:
      - "4002:4002"

  dashboard:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.dashboard
    environment:
      VITE_API_URL: http://localhost:4000
    ports:
      - "3000:80"
    depends_on:
      - api

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../nginx/conf.d:/etc/nginx/conf.d:ro
    ports:
      - "8080:80"
    depends_on:
      - api
      - dashboard
      - signaling

volumes:
  pgdata:
  miniodata:
