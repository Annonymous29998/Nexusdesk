name: Windows Installer E2E

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - 'apps/api/src/services/guest-access.ts'
      - 'apps/api/src/services/guest-installer-hta.ts'
      - 'apps/agent/**'
      - 'scripts/pack-agent-windows.sh'
      - 'scripts/windows-installer-e2e.ps1'
      - '.github/workflows/windows-installer-e2e.yml'
  pull_request:
    paths:
      - 'apps/api/src/services/guest-access.ts'
      - 'apps/api/src/services/guest-installer-hta.ts'
      - 'apps/agent/**'
      - 'scripts/pack-agent-windows.sh'
      - 'scripts/windows-installer-e2e.ps1'
      - '.github/workflows/windows-installer-e2e.yml'

jobs:
  windows-guest-installer:
    runs-on: windows-latest
    timeout-minutes: 45

    env:
      # Native Windows Postgres/Redis (Docker Linux images cannot run in Windows-container mode)
      DATABASE_URL: postgresql://nexusdesk:nexusdesk@127.0.0.1:5432/nexusdesk?schema=public
      REDIS_URL: redis://127.0.0.1:6379
      API_URL: http://127.0.0.1:4000
      APP_URL: http://127.0.0.1:3000
      WS_URL: ws://127.0.0.1:4000
      NODE_ENV: test
      LOG_LEVEL: info
      JWT_ACCESS_SECRET: ci-access-secret-min-32-characters-long!!
      JWT_REFRESH_SECRET: ci-refresh-secret-min-32-characters-long!
      SESSION_SECRET: ci-session-secret-min-32-characters-long!!
      ENCRYPTION_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
      AGENT_ENROLLMENT_SECRET: ci-agent-enrollment-secret!!
      INTERNAL_API_TOKEN: ci-internal-api-token-min-32-chars!!
      SEED_ADMIN_EMAIL: admin@nexusdesk.com
      SEED_ADMIN_PASSWORD: CiAdmin2026!Secure
      SEED_ADMIN_NAME: CI Administrator
      SEED_ORG_NAME: NexusDesk CI
      SEED_ORG_SLUG: nexusdesk-ci
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      PGPASSWORD: nexusdesk

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install Postgres and Redis (native Windows)
        shell: pwsh
        run: |
          if (-not (Test-Path .env)) { Copy-Item .env.example .env }

          # Alpine Linux images fail on windows-latest with:
          # "no matching manifest for windows(...)/amd64"
          choco install postgresql16 --params '/Password:postgres' -y --no-progress
          if ($LASTEXITCODE -ne 0) { throw 'PostgreSQL Chocolatey install failed' }
          choco install redis-64 -y --no-progress
          if ($LASTEXITCODE -ne 0) { throw 'Redis Chocolatey install failed' }

          $pgBin = 'C:\Program Files\PostgreSQL\16\bin'
          if (-not (Test-Path $pgBin)) { throw "PostgreSQL bin not found at $pgBin" }
          $env:Path = "$pgBin;$env:Path"
          "PATH=$env:Path" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "PGPASSWORD=postgres" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          $env:PGPASSWORD = 'postgres'

          $svc = Get-Service -Name 'postgresql*' -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $svc) { throw 'PostgreSQL Windows service not found after install' }
          if ($svc.Status -ne 'Running') { Start-Service $svc.Name; Start-Sleep -Seconds 3 }

          & "$pgBin\psql.exe" -U postgres -c "CREATE USER nexusdesk WITH PASSWORD 'nexusdesk';" 2>$null | Out-Null
          & "$pgBin\psql.exe" -U postgres -c "CREATE DATABASE nexusdesk OWNER nexusdesk;" 2>$null | Out-Null
          & "$pgBin\psql.exe" -U postgres -c "ALTER USER nexusdesk WITH PASSWORD 'nexusdesk';"
          & "$pgBin\psql.exe" -U postgres -d nexusdesk -c "GRANT ALL ON SCHEMA public TO nexusdesk;"

          $redisExe = Get-ChildItem -Path 'C:\ProgramData\chocolatey\lib','C:\Program Files','C:\Redis' -Filter 'redis-server.exe' -Recurse -ErrorAction SilentlyContinue |
            Select-Object -First 1 -ExpandProperty FullName
          if (-not $redisExe) { throw 'redis-server.exe not found after Chocolatey install' }
          Start-Process -FilePath $redisExe -ArgumentList '--port','6379' -WindowStyle Hidden
          Start-Sleep -Seconds 2

          $deadline = (Get-Date).AddMinutes(2)
          do {
            $pgOk = $false
            $rdOk = $false
            & "$pgBin\pg_isready.exe" -h 127.0.0.1 -p 5432 | Out-Null
            if ($LASTEXITCODE -eq 0) { $pgOk = $true }
            $cli = Get-ChildItem -Path 'C:\ProgramData\chocolatey\lib','C:\Program Files','C:\Redis' -Filter 'redis-cli.exe' -Recurse -ErrorAction SilentlyContinue |
              Select-Object -First 1 -ExpandProperty FullName
            if ($cli) {
              $pong = & $cli ping 2>$null
              if ("$pong" -match 'PONG') { $rdOk = $true }
            }
            if ($pgOk -and $rdOk) {
              Write-Host 'Postgres and Redis are ready (native Windows)'
              exit 0
            }
            Start-Sleep -Seconds 2
          } while ((Get-Date) -lt $deadline)

          throw 'Postgres/Redis not ready after native Windows install'

      - name: Install dependencies
        run: npm ci

      - name: Build shared packages and API
        run: |
          npm run build -w @nexusdesk/types
          npm run build -w @nexusdesk/utils
          npm run build -w @nexusdesk/shared
          npm run build -w @nexusdesk/agent
          npm run prisma:generate -w @nexusdesk/api

      - name: Pack Windows agent
        shell: bash
        run: npm run pack:agent

      - name: Prepare database
        working-directory: apps/api
        run: |
          npx prisma db push
          npm run prisma:seed

      - name: Start API server
        shell: pwsh
        run: |
          $log = "$env:RUNNER_TEMP\nexusdesk-api.log"
          $p = Start-Process -FilePath "npx" -ArgumentList "tsx","src/main.ts" -WorkingDirectory "$env:GITHUB_WORKSPACE/apps/api" -RedirectStandardOutput $log -RedirectStandardError $log -PassThru -WindowStyle Hidden
          Set-Content -Path "$env:RUNNER_TEMP\api.pid" -Value $p.Id
          Write-Host "API pid $($p.Id)"

      - name: Download HTA, run installer, verify enrollment
        shell: pwsh
        run: |
          & "$env:GITHUB_WORKSPACE/scripts/windows-installer-e2e.ps1" -ApiUrl $env:API_URL

      - name: Upload installer logs on failure
        if: failure()
        shell: pwsh
        run: |
          $logs = @(
            "$env:ProgramData\NexusDesk\Agent\install.log",
            "$env:ProgramData\NexusDesk\Agent\agent.log",
            "$env:RUNNER_TEMP\nexusdesk-api.log"
          )
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          foreach ($f in $logs) {
            if (Test-Path $f) { Copy-Item $f "artifacts/" -ErrorAction SilentlyContinue }
          }

      - name: Upload artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer-logs
          path: artifacts/

      - name: Stop API server
        if: always()
        shell: pwsh
        run: |
          $pidFile = "$env:RUNNER_TEMP\api.pid"
          if (Test-Path $pidFile) {
            $apiPid = Get-Content $pidFile
            Stop-Process -Id $apiPid -Force -ErrorAction SilentlyContinue
          }
